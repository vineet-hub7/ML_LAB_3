<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Predictions Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="blob-bg"></div>
    <div class="blob-bg blob-2"></div>
    
    <div class="container glass-panel">
        <header>
            <h1>ML Prediction <span>Studio</span></h1>
            <p>Experience the power of our trained models instantly.</p>
        </header>

        <div class="tabs" style="display: none;">
            <button class="tab-btn active" data-target="tennis-section">Play Tennis Predictor</button>
            <button class="tab-btn" data-target="social-section">Social Network Ads</button>
        </div>

        <main>
            <!-- Play Tennis Section -->
            <section id="tennis-section" class="model-section active">
                <h2>Should you play Tennis today?</h2>
                <form id="tennis-form">
                    <div class="input-group">
                        <label for="outlook">Outlook</label>
                        <select id="outlook" name="outlook" required>
                            <option value="2" selected>Sunny</option>
                            <option value="0">Overcast</option>
                            <option value="1">Rain</option>
                        </select>
                    </div>
                    
                    <div class="input-group">
                        <label for="temp">Temperature</label>
                        <select id="temp" name="temp" required>
                            <option value="1" selected>Hot</option>
                            <option value="2">Mild</option>
                            <option value="0">Cool</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="humidity">Humidity</label>
                        <select id="humidity" name="humidity" required>
                            <option value="0" selected>High</option>
                            <option value="1">Normal</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="wind">Wind</label>
                        <select id="wind" name="wind" required>
                            <option value="1" selected>Weak</option>
                            <option value="0">Strong</option>
                        </select>
                    </div>

                    <button type="submit" class="submit-btn">Predict Outcome</button>
                </form>
                
                <div class="result-card hidden" id="tennis-result">
                    <h3>Prediction</h3>
                    <div class="prediction-text" id="tennis-output"></div>
                </div>
            </section>

            <!-- Social Network Ads Section -->
            <section id="social-section" class="model-section active" style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1);">
                <h2>Product Purchase Predictor</h2>
                <p class="subtitle">Based on Social Network Ads data</p>
                <form id="social-form">
                    <div class="input-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" name="age" min="18" max="100" value="30" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="salary">Estimated Salary ($)</label>
                        <input type="number" id="salary" name="salary" min="0" step="1000" value="50000" required>
                    </div>

                    <div class="input-group">
                        <label for="scaler_choice">Feature Scaler Algorithm</label>
                        <select id="scaler_choice" name="scaler_choice" required>
                            <option value="standard" selected>Standard Scaler (Preferred)</option>
                            <option value="minmax">MinMax Scaler</option>
                        </select>
                    </div>

                    <button type="submit" class="submit-btn" style="--btn-color: #f72585;">Predict Purchase</button>
                </form>
                
                <div class="result-card hidden" id="social-result">
                    <h3>Prediction Result</h3>
                    <div class="prediction-text" id="social-output"></div>
                    <div class="scaler-used" id="social-scaler-out"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
